# Night-3 toy gate sweep v1 (no gate-lr / schedule): does the L0 gate penalty
# prune k_max=4 -> the true variable count?
# 45 runs: {hier l1, hier l2, bool l1} x lambda_gate {0,0.01,0.03,0.1,0.3} x seeds {0,1,2}.
# Reconstructed from scripts/gates_toy_node{0,1,2}.sh and scripts/sweep_gates_toy.sh.

[sweep]
name = "gates_toy_v1"
runner = "toy"
out_dir = "night3/gates_toy"
out_pattern = "{task_short}_l{site_layer}_lg{lambda_gate}_s{seed}.json"

[grid]
"task+site_layer" = [
  ["hierarchical_equality", 1],
  ["hierarchical_equality", 2],
  ["boolean_comp", 1],
]
lambda_gate = [0, 0.01, 0.03, 0.1, 0.3]
seed = [0, 1, 2]

[fixed]
method = "joint"
gates = true
steps = 1500
k_max = 4
device = "cuda"
